<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Hub Ultimate - Final v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-heavy: rgba(255, 255, 255, 0.2);
            --bg-gradient: linear-gradient(160deg, #020617 0%, #1e293b 100%);
            --accent: #38bdf8;
            --danger: #ef4444;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: "Yu Gothic UI", "Inter", sans-serif;
            background: var(--bg-gradient);
            color: white; height: 100vh; overflow: hidden;
            user-select: none;
        }

        /* --- アニメーション --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes wiggle { 0%, 100% { transform: rotate(-0.3deg); } 50% { transform: rotate(0.3deg); } }
        @keyframes breathe { 
            0%, 100% { transform: scale(0.85); background: rgba(56, 189, 248, 0.1); } 
            50% { transform: scale(1.15); background: rgba(56, 189, 248, 0.4); } 
        }

        /* --- スクリーンセーバー --- */
        #screensaver {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black; background-size: cover; background-position: center;
            display: none; z-index: 9999; opacity: 0; transition: opacity 1s ease;
            cursor: pointer;
        }
        #saver-guide {
            position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.4); padding: 10px 20px; border-radius: 30px;
            font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2);
            opacity: 0; transition: opacity 0.5s ease; pointer-events: none;
        }
        #saver-info { 
            position: absolute; bottom: 50px; right: 50px; 
            text-align: right; text-shadow: 0 5px 20px rgba(0,0,0,0.8); 
        }

        /* --- ヘッダー --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px; background: rgba(0,0,0,0.3); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .header-clock { font-size: 1.1rem; font-weight: 300; }
        .controls button {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 8px 16px; border-radius: 10px; cursor: pointer; transition: 0.3s; margin-left: 10px;
        }
        .controls button:hover { background: var(--glass-heavy); border-color: var(--accent); }
        .btn-danger { background: rgba(239, 68, 68, 0.2) !important; border-color: var(--danger) !important; }

        /* --- グリッド --- */
        .grid-container {
            display: flex; flex-wrap: wrap; align-content: flex-start;
            gap: 20px; padding: 30px; height: calc(100vh - 100px); overflow-y: auto;
        }

        .card {
            background: var(--glass); backdrop-filter: blur(25px);
            border-radius: 24px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
            min-width: 250px; min-height: 180px;
            animation: fadeIn 0.6s ease-out forwards;
        }

        .edit-mode .card { animation: wiggle 0.4s infinite; border: 2px dashed var(--accent); resize: both; overflow: auto; }
        .edit-mode .card iframe { pointer-events: none; }

        .card h3 { margin: 0 0 15px 0; font-size: 0.7rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0; }
        .widget-body { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .iframe-wrapper { width: 100%; height: 100%; border-radius: 12px; overflow: hidden; background: rgba(0,0,0,0.1); }
        iframe { border: none; width: 100%; height: 100%; background: white; }

        .breathe-circle { width: 90px; height: 90px; border-radius: 50%; animation: breathe 8s ease-in-out infinite; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; }
        .greeting-text { font-size: 1.8rem; font-weight: 700; width: 100%; text-align: left; }
        .greeting-date { font-size: 0.9rem; opacity: 0.6; margin-top: 5px; width: 100%; text-align: left; }

        .del-btn { display: none; position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; border-radius: 8px; background: var(--danger); color: white; border: none; cursor: pointer; z-index: 50; }
        .edit-mode .del-btn { display: block; }
        .edit-toolbar { display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #000; border: 1px solid var(--accent); padding: 12px 25px; border-radius: 40px; z-index: 1000; }
    </style>
</head>
<body onmousemove="resetIdle()" onclick="resetIdle()" onkeypress="resetIdle()">

<div id="screensaver" onclick="exitScreensaver()">
    <div id="saver-guide">クリックして終了</div>
    <div id="saver-info">
        <div id="saver-time" style="font-size: 5rem; font-weight: 700; line-height: 1;"></div>
        <div id="saver-date" style="font-size: 1.5rem; font-weight: 300; opacity: 0.8; margin-top: 5px;"></div>
    </div>
</div>

<header>
    <div class="header-clock" id="header-clock">--:--</div>
    <div class="controls">
        <button id="edit-mode-toggle" onclick="toggleEditMode()">レイアウト編集</button>
        <button class="btn-danger" onclick="resetAll()">初期化</button>
        <button onclick="toggleFullScreen()">全画面</button>
    </div>
</header>

<div class="grid-container" id="grid">
    <div class="card" data-id="greeting" style="width: 480px; height: 220px;">
        <button class="del-btn" onclick="removeWidget(this)">×</button>
        <h3>Personal</h3>
        <div class="widget-body">
            <div id="greet-msg" class="greeting-text">Loading...</div>
            <div id="greet-date" class="greeting-date">----年--月--日</div>
        </div>
    </div>
    <div class="card" data-id="mindfulness" style="width: 280px; height: 220px;">
        <button class="del-btn" onclick="removeWidget(this)">×</button>
        <h3>Mindfulness</h3>
        <div class="widget-body"><div class="breathe-circle" id="breathe-status">吸って...</div></div>
    </div>
    <div class="card" data-id="news" style="width: 420px; height: 400px;">
        <button class="del-btn" onclick="removeWidget(this)">×</button>
        </h3>News</h3>
        <div class="iframe-wrapper"><iframe src="https://slashdot.org"></iframe></div>
    </div>
    <div class="card" data-id="quake" style="width: 420px; height: 400px;">
        <button class="del-btn" onclick="removeWidget(this)">×</button>
        <h3>Earthquake Monitor</h3>
        <div class="iframe-wrapper"><iframe src="https://ayatocraft.github.io/earthquake"></iframe></div>
    </div>
    <div class="card" data-id="weather" style="width: 420px; height: 400px;">
        <button class="del-btn" onclick="removeWidget(this)">×</button>
        <h3>Weather Radar</h3>
        <div class="iframe-wrapper"><iframe src="https://weathernews.jp/onebox/radar/"></iframe></div>
    </div>
</div>

<div id="edit-toolbar" class="edit-toolbar">
    <button onclick="addNewWidget()" style="background:none; border:none; color:white; cursor:pointer;">＋ 追加</button>
    <button onclick="toggleEditMode()" style="margin-left:20px; background:var(--accent); color:black; font-weight:bold; border:none; padding:8px 20px; border-radius:20px; cursor:pointer;">保存</button>
</div>

<script>
    let isEditMode = false;
    let idleTime = 0;
    let sortable;
    let guideTimer;

    function updateSystem() {
        const now = new Date();
        const hour = now.getHours();
        const tStr = now.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
        const dStr = now.toLocaleDateString('ja-JP', {year:'numeric', month:'long', day:'numeric', weekday:'short'});
        
        document.getElementById('header-clock').innerText = tStr;
        
        const gMsg = document.getElementById('greet-msg');
        if(gMsg) {
            let greet = (hour >= 5 && hour < 11) ? "おはようございます。" : (hour >= 11 && hour < 18) ? "こんにちは。" : "こんばんは。";
            gMsg.innerText = greet;
            document.getElementById('greet-date').innerText = `今日は ${dStr} です`;
        }
        const bStatus = document.getElementById('breathe-status');
        if(bStatus) bStatus.innerText = (now.getSeconds() % 8 < 4) ? "吸って..." : "吐いて...";

        if(document.getElementById('screensaver').style.display === 'block') {
            document.getElementById('saver-time').innerText = tStr;
            document.getElementById('saver-date').innerText = dStr;
        }
    }

    function resetIdle() { 
        idleTime = 0; 
        if(document.getElementById('screensaver').style.display === 'block') {
            const guide = document.getElementById('saver-guide');
            guide.style.opacity = '1';
            clearTimeout(guideTimer);
            guideTimer = setTimeout(() => { guide.style.opacity = '0'; }, 2000);
        }
    }

    function enterScreensaver() {
        const ss = document.getElementById('screensaver');
        ss.style.backgroundImage = `url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=1920&q=80')`;
        ss.style.display = 'block';
        setTimeout(() => ss.style.opacity = '1', 50);
    }

    function exitScreensaver() {
        const ss = document.getElementById('screensaver');
        ss.style.opacity = '0';
        setTimeout(() => { ss.style.display = 'none'; idleTime = 0; }, 1000);
    }

    function saveLayout() { localStorage.setItem('hub_ultimate_v7', document.getElementById('grid').innerHTML); }
    function loadLayout() {
        const saved = localStorage.getItem('hub_ultimate_v7');
        if (saved) document.getElementById('grid').innerHTML = saved;
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        const grid = document.getElementById('grid');
        const toolbar = document.getElementById('edit-toolbar');
        if (isEditMode) {
            grid.classList.add('edit-mode');
            toolbar.style.display = 'block';
            sortable = Sortable.create(grid, { animation: 200 });
        } else {
            grid.classList.remove('edit-mode');
            toolbar.style.display = 'none';
            if(sortable) sortable.destroy();
            saveLayout();
        }
    }

    function resetAll() { if(confirm('初期化しますか？')) { localStorage.removeItem('hub_ultimate_v7'); location.reload(); } }
    function removeWidget(btn) { if(confirm('削除しますか？')) { btn.closest('.card').remove(); saveLayout(); } }
    function addNewWidget() {
        const input = prompt("URLを入力:");
        if (input) {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.width = "400px"; div.style.height = "300px";
            div.innerHTML = `<button class="del-btn" onclick="removeWidget(this)">×</button><h3>Custom</h3><div class="widget-body"><div class="iframe-wrapper"><iframe src="${input}"></iframe></div></div>`;
            document.getElementById('grid').appendChild(div);
            saveLayout();
        }
    }
    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    setInterval(() => {
        idleTime++;
        if (idleTime >= 60 && !isEditMode) enterScreensaver();
        updateSystem();
    }, 1000);

    window.onload = () => { loadLayout(); updateSystem(); };
</script>
</body>
</html>
